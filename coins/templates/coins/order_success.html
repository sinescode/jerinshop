{% extends "home/base.html" %}
{% block title %}Order Submitted — Jerin Shop{% endblock %}

{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:40px 0;">
  <div style="
    background:rgba(15,21,32,0.7);backdrop-filter:blur(20px);
    border:1px solid rgba(0,230,138,0.15);border-radius:24px;
    padding:52px 44px;max-width:460px;width:100%;text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,0.4),0 0 0 1px rgba(0,230,138,0.05);
  ">
    <div style="font-size:64px;margin-bottom:20px;animation:pop 0.5s cubic-bezier(.175,.885,.32,1.275) both"><i class="fas fa-check-circle" style="font-size:64px"></i></div>
    <h1 style="font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;margin-bottom:12px;color:#e8ecf4;">
      Order <span style="color:var(--accent)">Submitted!</span>
    </h1>
    <p style="color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:28px;">
      Your order has been received and sent to our team.<br>We'll process it as soon as possible.
    </p>
    <div style="
      background:rgba(0,230,138,0.06);border:1px solid rgba(0,230,138,0.15);
      border-radius:12px;padding:16px 24px;margin-bottom:32px;
    ">
<div style="font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;">Order ID</div>
<div style="font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--accent);">#{{ order.order_id }}</div>
    </div>
    <a href="{% url 'coins:home' %}" style="
      display:inline-flex;align-items:center;gap:8px;
      background:var(--accent);color:#0a0e17;
      font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;
      padding:13px 30px;border-radius:10px;text-decoration:none;
      box-shadow:0 4px 20px rgba(0,230,138,0.3);
      transition:transform 0.15s,box-shadow 0.15s;
    " onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      ← Back to Store
    </a>
  </div>
</div>
<style>
  @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
</style>
{% endblock %}
