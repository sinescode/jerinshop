{% extends 'home/base.html' %}
{% block title %}{{ about_us.title }} — Jerin Shop{% endblock %}
{% block extra_head %}
<style>
  .page-wrap { max-width: 800px; margin: 0 auto; padding: 3rem 1rem; }
  .page-header { text-align: center; margin-bottom: 2rem; }
  .page-icon { width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.25rem; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--border); }
  .page-title { font-family: 'Outfit', sans-serif; font-size: 1.75rem; font-weight: 700; color: var(--fg); }
  .page-content { color: var(--muted); line-height: 1.8; font-size: 0.95rem; }
  .page-content p { margin-bottom: 1rem; }
  .page-content h2 { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 600; color: var(--fg); margin: 1.5rem 0 0.75rem; }
  .page-content h3 { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 600; color: var(--fg); margin: 1.25rem 0 0.5rem; }
  .page-content ul, .page-content ol { margin-bottom: 1rem; padding-left: 1.5rem; }
  .page-content li { margin-bottom: 0.4rem; }
  .page-content a { color: var(--accent); text-decoration: underline; }
  .page-content strong { color: var(--fg); }
</style>
{% endblock %}
{% block content %}
<div class="page-wrap">
  <div class="page-header">
    <div class="page-icon"><i class="{{ about_us.icon_class }}"></i></div>
    <h1 class="page-title">{{ about_us.title }}</h1>
  </div>
  <div class="page-content">{{ about_us.content|linebreaks }}</div>
</div>
{% endblock %}
